name: deploy

# Assemble the farm into a static site and publish to GitHub Pages — the portal at /microapps/ and
# every app at /microapps/<app>/. No backend: data apps use the direct-first / public-proxy chain.
# On PR it only builds (a check); on main it builds and deploys.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SKILL_TOKEN }}
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Assemble dist/ (runtime + apps + portal)
        run: deno run -A deploy/build.mjs /microapps
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
