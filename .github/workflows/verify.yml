name: verify

# The gate. Runs the harness (e2e + design checks) for every app in the farm on a clean Ubuntu
# runner — the stable home for headed Chromium that the local proot env never was. Also generates
# the PWA icons here (Chromium canvas) so NOTHING needs Chromium on the device. Local cycle is
# browser-free: build + `deno eval` spec-validate + push; CI is the gate.

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # commit regenerated icons back to the feature branch

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout farm + skill submodule
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SKILL_TOKEN }}   # PAT: reads private submodule + pushes icons

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Unit tests (pure logic, no browser — fails fast before the gate)
        # Dep-free tests only. (skill/runtime/validate_test.js is local-only — it reads farm specs by
        # an absolute /root path; fix its paths before adding it here.)
        run: deno test skill/runtime/pure_test.ts flashlight/morse_test.js

      - name: Install Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Xvfb + fonts
        run: sudo apt-get update && sudo apt-get install -y xvfb fonts-liberation

      - name: Generate PWA icons (Chromium on the runner, never locally)
        env:
          DISPLAY: ":99"
          DISPLAY_NUM: "99"
          CHROMIUM_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: |
          deno task -c skill/harness/deno.json setup
          for d in */ ; do
            if [ -f "${d}spec.json" ] && [ -f "${d}brand.svg" ]; then
              echo "icons: ${d%/}"
              deno task -c skill/harness/deno.json icons "$GITHUB_WORKSPACE/${d%/}"
            fi
          done

      - name: Commit regenerated icons to the branch
        # Only on a feature-branch push (main is protected/PR-only; PR events run on a detached merge ref).
        if: github.event_name == 'push' && github.ref_name != 'main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A                       # only icon files change before check-all (catches new/untracked too)
          if git diff --cached --quiet; then
            echo "icons unchanged — nothing to commit"
          else
            git commit -m "ci: regenerate PWA icons [skip ci]"
            git push origin "HEAD:${{ github.ref_name }}"
          fi

      - name: Verify whole farm (check-all)
        env:
          DISPLAY: ":99"
          DISPLAY_NUM: "99"
          CHROMIUM_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: deno task -c skill/harness/deno.json check-all "$GITHUB_WORKSPACE"

      # The human-eye gate: CI renders the populated screens (?mock for sensor apps), uploads them as
      # an artifact. A human (me via `gh run download` + viewing, and the user on-device) judges the
      # actual UX — the aesthetic call CI's mechanical design checks can't make. Runs even if check-all
      # fails, so a broken screen is still visible.
      - name: Screenshots for human-eye review
        if: always() && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch')
        env:
          DISPLAY: ":99"
          DISPLAY_NUM: "99"
          CHROMIUM_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: |
          deno task -c skill/harness/deno.json setup
          mkdir -p _shots
          for d in */ ; do
            [ -f "${d}spec.json" ] || continue
            app="${d%/}"
            echo "shot: $app"
            deno task -c skill/harness/deno.json shot "$GITHUB_WORKSPACE/$app" "$GITHUB_WORKSPACE/_shots/$app.png" \
              --query "mock=1" --width 384 --height 832 --settle 3500 || echo "  shot failed: $app"
          done
          ls -la _shots

      - name: Upload screenshots
        if: always() && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: _shots/*.png
          if-no-files-found: warn
