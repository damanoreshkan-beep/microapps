name: verify

# The gate, optimised: only the changed apps are verified on a PR (full farm when the runtime/skill/
# workflow changes or on manual dispatch), each app in its own parallel matrix job with a warm deno
# cache, and screenshots only for the apps actually verified. Runtime is off-device — CI is the gate.

on:
  push:
    branches: [main, "**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # icons commit-back to the feature branch

jobs:
  # Detect which apps to verify + run the fast browser-free unit tests once.
  changes:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.detect.outputs.apps }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.SKILL_TOKEN }}
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Unit tests (pure logic, no browser)
        run: deno test skill/runtime/pure_test.ts flashlight/morse_test.js
      - name: Detect changed apps
        id: detect
        run: |
          all_apps() { for d in */; do [ -f "${d}spec.json" ] && [ -f "${d}e2e.spec.mjs" ] && echo "${d%/}"; done; }
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch -q origin "${{ github.base_ref }}"
            CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || all_apps | sed 's#$#/spec.json#')
          fi
          echo "changed files:"; echo "$CHANGED"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || echo "$CHANGED" | grep -qE '^(skill|\.github/|deploy/)'; then
            APPS=$(all_apps)                                   # runtime/infra change or manual → whole farm
          else
            APPS=$(echo "$CHANGED" | grep -oE '^[^/]+/' | sort -u | sed 's#/##' \
              | while read -r d; do [ -f "$d/spec.json" ] && [ -f "$d/e2e.spec.mjs" ] && echo "$d"; done)
          fi
          JSON=$(echo "$APPS" | grep -v '^$' | jq -R . | jq -cs .)
          echo "apps to verify → $JSON"
          echo "apps=$JSON" >> "$GITHUB_OUTPUT"

  # Regenerate PWA icons for the changed apps and commit them back (single job → no parallel git races).
  icons:
    needs: changes
    if: needs.changes.outputs.apps != '[]' && github.event_name == 'push' && github.ref_name != 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive, token: "${{ secrets.SKILL_TOKEN }}" }
      - uses: denoland/setup-deno@v2
        with: { deno-version: v2.x }
      - uses: browser-actions/setup-chrome@v1
        id: chrome
        with: { chrome-version: stable }
      - run: sudo apt-get update && sudo apt-get install -y xvfb fonts-liberation
      - name: Generate icons for changed apps
        env: { DISPLAY: ":99", DISPLAY_NUM: "99", CHROMIUM_PATH: "${{ steps.chrome.outputs.chrome-path }}" }
        run: |
          deno task -c skill/harness/deno.json setup
          for app in $(echo '${{ needs.changes.outputs.apps }}' | jq -r '.[]'); do
            [ -f "$app/brand.svg" ] && deno task -c skill/harness/deno.json icons "$GITHUB_WORKSPACE/$app"
          done
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "ci: regenerate PWA icons [skip ci]"
            git push origin "HEAD:${{ github.ref_name }}"
          fi

  # One parallel job per changed app: e2e + design gate, plus a populated screenshot on PR/dispatch.
  verify:
    needs: changes
    if: needs.changes.outputs.apps != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.changes.outputs.apps) }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive, token: "${{ secrets.SKILL_TOKEN }}" }
      - uses: denoland/setup-deno@v2
        with: { deno-version: v2.x }
      - name: Cache deno deps
        uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: deno-${{ hashFiles('skill/**/deno.lock') }}
          restore-keys: deno-
      - uses: browser-actions/setup-chrome@v1
        id: chrome
        with: { chrome-version: stable }
      - run: sudo apt-get update && sudo apt-get install -y xvfb fonts-liberation
      - name: Verify ${{ matrix.app }}
        env: { DISPLAY: ":99", DISPLAY_NUM: "99", CHROMIUM_PATH: "${{ steps.chrome.outputs.chrome-path }}" }
        run: |
          SHOTS=""
          case "${{ github.event_name }}" in pull_request|workflow_dispatch) SHOTS="--shots" ;; esac
          deno task -c skill/harness/deno.json verify "$GITHUB_WORKSPACE/${{ matrix.app }}" $SHOTS
      - name: Upload screenshot
        if: always() && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@v4
        with:
          name: shot-${{ matrix.app }}
          path: ${{ matrix.app }}/states/main.png
          if-no-files-found: warn
